<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioLink - Custom Link Lists</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Loading screen -->
        <div id="loading" class="loading-screen">
            <div class="spinner"></div>
            <p>Loading BioLink...</p>
        </div>
        
        <!-- Auth screens will be inserted here -->
        <div id="auth-container" class="hidden"></div>
        
        <!-- Main app will be inserted here -->
        <div id="main-app" class="hidden"></div>
        
        <!-- Public viewer will be inserted here -->
        <div id="public-viewer" class="hidden"></div>
    </div>
    
    <script type="module" src="src/main.js"></script>
</body>
</html>
