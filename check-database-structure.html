<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Structure Checker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 3px; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
        pre { white-space: pre-wrap; word-wrap: break-word; }
        table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Database Structure Checker</h1>
    
    <div class="section">
        <h2>1. Check Profiles Table Structure</h2>
        <button onclick="checkProfilesTable()">Check Profiles Table</button>
        <div id="profilesResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>2. Check Collections Table Structure</h2>
        <button onclick="checkCollectionsTable()">Check Collections Table</button>
        <div id="collectionsResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>3. Check Links Table Structure</h2>
        <button onclick="checkLinksTable()">Check Links Table</button>
        <div id="linksResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>4. Check Storage Buckets</h2>
        <button onclick="checkStorageBuckets()">Check Storage Buckets</button>
        <div id="storageResult" class="result"></div>
    </div>
    
    <div class="section">
        <h2>5. Test Profile Data</h2>
        <button onclick="testProfileData()">Test Profile Data</button>
        <div id="profileDataResult" class="result"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://natzpfyxpuycsuuzbqrd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdHpwZnl4cHV5Y3N1dXpicXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA5NTExODQsImV4cCI6MjA3NjUyNzE4NH0.q06AAoHZrfS3-O7568VpikaOtn6qAlDyDM7VR6sgzeU';
        
        let supabase;
        
        // Initialize Supabase when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('Supabase initialized for database checker');
        });
        
        async function checkProfilesTable() {
            const resultDiv = document.getElementById('profilesResult');
            resultDiv.innerHTML = 'Checking profiles table...';
            
            if (!supabase) {
                resultDiv.innerHTML = '<div class="error">Supabase not initialized. Please wait a moment and try again.</div>';
                return;
            }
            
            try {
                // Try to get table structure by selecting all columns
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                    return;
                }
                
                // Get column information by trying to select each expected column
                const expectedColumns = [
                    'id', 'handle', 'display_name', 'avatar_url', 'created_at', 'updated_at',
                    'profile_photo', 'social_instagram', 'social_facebook', 'social_twitter', 
                    'social_linkedin', 'social_email', 'social_youtube', 'social_tiktok', 
                    'social_snapchat', 'profile_photo_position', 'background_type', 
                    'background_color', 'gradient_color1', 'gradient_color2', 'text_color', 
                    'link_color', 'button_style', 'button_color'
                ];
                
                const existingColumns = [];
                const missingColumns = [];
                
                for (const column of expectedColumns) {
                    try {
                        await supabase.from('profiles').select(column).limit(1);
                        existingColumns.push(column);
                    } catch (colError) {
                        if (colError.message.includes('does not exist')) {
                            missingColumns.push(column);
                        }
                    }
                }
                
                let html = '<h3>Profiles Table Analysis:</h3>';
                html += `<p><strong>Existing columns (${existingColumns.length}):</strong></p>`;
                html += `<pre>${existingColumns.join(', ')}</pre>`;
                
                if (missingColumns.length > 0) {
                    html += `<p><strong>Missing columns (${missingColumns.length}):</strong></p>`;
                    html += `<pre>${missingColumns.join(', ')}</pre>`;
                    html += `<p><strong>Action needed:</strong> Run add-theme-columns.sql to add missing columns</p>`;
                } else {
                    html += `<div class="success">✅ All required columns exist!</div>`;
                }
                
                // Show sample data if available
                if (data && data.length > 0) {
                    html += '<h4>Sample Profile Data:</h4>';
                    html += '<pre>' + JSON.stringify(data[0], null, 2) + '</pre>';
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        async function checkCollectionsTable() {
            const resultDiv = document.getElementById('collectionsResult');
            resultDiv.innerHTML = 'Checking collections table...';
            
            if (!supabase) {
                resultDiv.innerHTML = '<div class="error">Supabase not initialized. Please wait a moment and try again.</div>';
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('collections')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                    return;
                }
                
                const expectedColumns = ['id', 'user_id', 'name', 'description', 'is_public', 'handle', 'created_at', 'updated_at'];
                const existingColumns = [];
                const missingColumns = [];
                
                for (const column of expectedColumns) {
                    try {
                        await supabase.from('collections').select(column).limit(1);
                        existingColumns.push(column);
                    } catch (colError) {
                        if (colError.message.includes('does not exist')) {
                            missingColumns.push(column);
                        }
                    }
                }
                
                let html = '<h3>Collections Table Analysis:</h3>';
                html += `<p><strong>Existing columns (${existingColumns.length}):</strong></p>`;
                html += `<pre>${existingColumns.join(', ')}</pre>`;
                
                if (missingColumns.length > 0) {
                    html += `<p><strong>Missing columns (${missingColumns.length}):</strong></p>`;
                    html += `<pre>${missingColumns.join(', ')}</pre>`;
                } else {
                    html += `<div class="success">✅ All required columns exist!</div>`;
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        async function checkLinksTable() {
            const resultDiv = document.getElementById('linksResult');
            resultDiv.innerHTML = 'Checking links table...';
            
            if (!supabase) {
                resultDiv.innerHTML = '<div class="error">Supabase not initialized. Please wait a moment and try again.</div>';
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('links')
                    .select('*')
                    .limit(1);
                
                if (error) {
                    resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                    return;
                }
                
                const expectedColumns = ['id', 'collection_id', 'title', 'url', 'icon_url', 'position', 'created_at', 'updated_at'];
                const existingColumns = [];
                const missingColumns = [];
                
                for (const column of expectedColumns) {
                    try {
                        await supabase.from('links').select(column).limit(1);
                        existingColumns.push(column);
                    } catch (colError) {
                        if (colError.message.includes('does not exist')) {
                            missingColumns.push(column);
                        }
                    }
                }
                
                let html = '<h3>Links Table Analysis:</h3>';
                html += `<p><strong>Existing columns (${existingColumns.length}):</strong></p>`;
                html += `<pre>${existingColumns.join(', ')}</pre>`;
                
                if (missingColumns.length > 0) {
                    html += `<p><strong>Missing columns (${missingColumns.length}):</strong></p>`;
                    html += `<pre>${missingColumns.join(', ')}</pre>`;
                } else {
                    html += `<div class="success">✅ All required columns exist!</div>`;
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        async function checkStorageBuckets() {
            const resultDiv = document.getElementById('storageResult');
            resultDiv.innerHTML = 'Checking storage buckets...';
            
            if (!supabase) {
                resultDiv.innerHTML = '<div class="error">Supabase not initialized. Please wait a moment and try again.</div>';
                return;
            }
            
            try {
                const { data, error } = await supabase.storage.listBuckets();
                
                if (error) {
                    resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                    return;
                }
                
                let html = '<h3>Storage Buckets:</h3>';
                
                if (data && data.length > 0) {
                    html += '<table><tr><th>Name</th><th>Public</th><th>Created</th></tr>';
                    data.forEach(bucket => {
                        html += `<tr>
                            <td>${bucket.name}</td>
                            <td>${bucket.public ? 'Yes' : 'No'}</td>
                            <td>${new Date(bucket.created_at).toLocaleDateString()}</td>
                        </tr>`;
                    });
                    html += '</table>';
                    
                    const profilePhotosBucket = data.find(b => b.name === 'profile-photos');
                    if (profilePhotosBucket) {
                        html += `<div class="success">✅ profile-photos bucket exists and is ${profilePhotosBucket.public ? 'public' : 'private'}</div>`;
                    } else {
                        html += `<div class="error">❌ profile-photos bucket not found. Run setup-storage.sql</div>`;
                    }
                } else {
                    html += '<div class="error">No storage buckets found</div>';
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        async function testProfileData() {
            const resultDiv = document.getElementById('profileDataResult');
            resultDiv.innerHTML = 'Testing profile data...';
            
            if (!supabase) {
                resultDiv.innerHTML = '<div class="error">Supabase not initialized. Please wait a moment and try again.</div>';
                return;
            }
            
            try {
                // Get current user
                const { data: { user }, error: userError } = await supabase.auth.getUser();
                
                if (userError || !user) {
                    resultDiv.innerHTML = `<div class="error">No user logged in: ${userError?.message || 'No user found'}</div>`;
                    return;
                }
                
                // Get user's profile
                const { data: profile, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                
                if (profileError) {
                    resultDiv.innerHTML = `<div class="error">Error getting profile: ${profileError.message}</div>`;
                    return;
                }
                
                let html = '<h3>Your Profile Data:</h3>';
                html += '<table><tr><th>Field</th><th>Value</th></tr>';
                
                Object.keys(profile).forEach(key => {
                    let value = profile[key];
                    if (key === 'profile_photo' && value) {
                        value = `<a href="${value}" target="_blank">View Image</a>`;
                    }
                    html += `<tr><td>${key}</td><td>${value || 'null'}</td></tr>`;
                });
                
                html += '</table>';
                
                if (profile.profile_photo) {
                    html += '<h4>Profile Photo Preview:</h4>';
                    html += `<img src="${profile.profile_photo}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><div style="display:none; color: red;">Image failed to load (CORS issue)</div>`;
                }
                
                resultDiv.innerHTML = html;
                
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
