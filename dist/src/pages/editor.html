<body>
  <div id="app">
    <!-- Top Nav -->
    <nav id="main-nav" class="main-nav"></nav>

    <!-- Editor: 3-column layout -->
    <div class="editor-layout">
      <!-- Left: Links list for this collection -->
      <aside class="editor-sidebar">
        <div class="editor-sidebar-header">
          <a href="/src/pages/dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> My Collections</a>
          <h2 id="collection-title">Loading...</h2>
          <div id="collection-meta" class="collection-meta"></div>
        </div>
        <div id="links-list" class="links-list">
          <!-- Links rendered here -->
        </div>
        <div class="sidebar-actions">
          <button class="btn-primary btn-full" id="add-link-btn"><i class="fas fa-plus"></i> Add New Link</button>
          <button class="btn-secondary btn-full" id="add-existing-btn"><i class="fas fa-link"></i> Add Existing Link</button>
        </div>
      </aside>

      <!-- Center: Editor panel -->
      <main class="editor-main">
        <div class="tab-bar">
          <button class="tab active" data-tab="details">Collection</button>
          <button class="tab" data-tab="appearance">Appearance</button>
          <button class="tab" data-tab="qr-code">QR Code</button>
          <button class="tab" data-tab="analytics">Analytics</button>
        </div>
        <div id="tab-content" class="tab-content">
          <!-- Tab content rendered here -->
        </div>
      </main>

      <!-- Right: Live preview -->
      <aside class="editor-preview">
        <div class="preview-header">
          <span>Live Preview</span>
        </div>
        <div id="phone-preview" class="phone-mockup">
          <!-- Phone preview rendered here -->
        </div>
      </aside>
    </div>

    <!-- Add New Link Modal -->
    <div id="new-link-modal" class="modal-overlay" style="display:none;">
      <div class="modal">
        <div class="modal-header">
          <h3>Add New Link</h3>
          <button class="modal-close" id="new-link-modal-close"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="new-link-title">Title</label>
            <input type="text" id="new-link-title" placeholder="Link title">
          </div>
          <div class="form-group">
            <label for="new-link-url">URL</label>
            <input type="url" id="new-link-url" placeholder="https://...">
          </div>
          <div class="form-group">
            <label for="new-link-image">Image URL (optional)</label>
            <div class="image-input-row">
              <input type="text" id="new-link-image" placeholder="Image URL">
              <button type="button" class="btn-secondary" id="new-link-upload-btn"><i class="fas fa-upload"></i> Upload</button>
              <button type="button" class="btn-secondary" id="new-link-browse-btn"><i class="fas fa-images"></i> Browse</button>
              <input type="file" id="new-link-image-file" accept="image/*" style="display:none;">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="new-link-cancel">Cancel</button>
          <button class="btn-primary" id="new-link-save">Add Link</button>
        </div>
      </div>
    </div>

    <!-- Add Existing Link Modal -->
    <div id="existing-link-modal" class="modal-overlay" style="display:none;">
      <div class="modal modal-lg">
        <div class="modal-header">
          <h3>Add Existing Link</h3>
          <button class="modal-close" id="existing-link-modal-close"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <input type="search" id="existing-link-search" placeholder="Search your links...">
          </div>
          <div id="existing-links-list" class="existing-links-list">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
    <!-- Media Library Modal -->
    <div id="media-library-modal" class="modal-overlay" style="display:none;">
      <div class="modal modal-lg">
        <div class="modal-header">
          <h3>Media Library</h3>
          <button class="modal-close" id="media-library-close"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
          <div id="media-library-content">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
