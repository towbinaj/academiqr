<body>
  <div id="app">
    <!-- Top Nav -->
    <nav id="main-nav" class="main-nav"></nav>

    <!-- Dashboard -->
    <main class="dashboard">
      <header class="dashboard-header">
        <h1>My Collections</h1>
        <div class="dashboard-header-actions">
          <div class="search-wrapper" id="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="search" id="collection-search" placeholder="Search collections..." class="search-input">
          </div>
          <button class="btn-primary" id="new-collection-btn">+ New Collection</button>
        </div>
      </header>
      <div id="tag-filter-bar" class="tag-filter-bar" style="display:none;"></div>
      <div id="collections-grid" class="collections-grid">
        <!-- Collection cards rendered by JS -->
      </div>
    </main>
    <!-- New Collection Template Modal -->
    <div id="template-modal" class="modal-overlay" style="display:none;">
      <div class="modal" style="width:600px; max-width:90vw;">
        <div class="modal-header">
          <h3>New Collection</h3>
          <button class="modal-close" id="template-modal-close"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="new-coll-title">Collection Title</label>
            <input type="text" id="new-coll-title" placeholder="e.g. RSNA 2025 — AI in Radiology">
          </div>
          <label style="font-size:0.85rem; font-weight:600; color:var(--text-secondary); margin-bottom:8px; display:block;">Choose a Template</label>
          <div id="template-grid" class="template-grid">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
