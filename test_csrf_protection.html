<!DOCTYPE html>
<html>
<head>
    <title>CSRF Protection Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-result {
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>CSRF Protection Test</h1>
    <p>This page tests if your tracking endpoint has CSRF protection enabled.</p>
    
    <div id="results"></div>
    
    <button onclick="testCSRFProtection()">Test CSRF Protection</button>
    <button onclick="testValidRequest()">Test Valid Request (from your domain)</button>
    
    <script>
        const resultsDiv = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            resultsDiv.appendChild(div);
        }
        
        async function testCSRFProtection() {
            resultsDiv.innerHTML = '';
            addResult('Testing CSRF protection...', 'info');
            
            // Test with a fake origin (should be blocked)
            try {
                const response = await fetch('https://academiqr.com/api/track/test-link-id', {
                    method: 'GET',
                    headers: {
                        'Origin': 'https://malicious-site.com'
                    }
                });
                
                const data = await response.json();
                
                if (response.status === 403 && data.error === 'Invalid request origin') {
                    addResult('✅ CSRF Protection is WORKING! Requests from unauthorized domains are blocked.', 'success');
                } else {
                    addResult(`❌ CSRF Protection may NOT be working. Status: ${response.status}, Response: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Error testing CSRF protection: ${error.message}`, 'error');
            }
        }
        
        async function testValidRequest() {
            addResult('Testing valid request (from academiqr.com domain)...', 'info');
            
            try {
                // This should work if called from academiqr.com domain
                const response = await fetch('https://academiqr.com/api/track/test-link-id', {
                    method: 'GET'
                });
                
                if (response.status === 302 || response.status === 404) {
                    // 302 = redirect (valid), 404 = link not found (but endpoint works)
                    addResult('✅ Valid requests are working (redirect or 404 is expected for test link).', 'success');
                } else {
                    addResult(`Response status: ${response.status}`, 'info');
                }
            } catch (error) {
                addResult(`Error: ${error.message}`, 'error');
            }
        }
        
        // Auto-run test on page load
        window.onload = function() {
            addResult('Click the buttons above to test CSRF protection.', 'info');
        };
    </script>
</body>
</html>
