<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academiq - Link-in-Bio Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .hidden { display: none; }
        .btn {
            @apply px-4 py-2 rounded-md font-medium transition-colors;
        }
        .btn-primary {
            @apply bg-blue-600 text-white hover:bg-blue-700;
        }
        .btn-ghost {
            @apply bg-gray-100 text-gray-700 hover:bg-gray-200;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Loading Screen -->
        <div id="loading" class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-gray-600">Loading Academiq...</p>
            </div>
        </div>

        <!-- Auth Screen -->
        <div id="auth-container" class="hidden">
            <div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
                <div class="max-w-md w-full space-y-8">
                    <div>
                        <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                            Welcome to Academiq
                        </h2>
                        <p class="mt-2 text-center text-sm text-gray-600">
                            Create beautiful link lists for your academic work
                        </p>
                    </div>
                    <div class="mt-8 space-y-6">
                        <div>
                            <button onclick="signInWithGoogle()" class="group relative w-full flex justify-center py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                                    <svg class="h-5 w-5" viewBox="0 0 24 24">
                                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                    </svg>
                                </span>
                                Continue with Google
                            </button>
                        </div>
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300" />
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-gray-50 text-gray-500">Or sign in with email</span>
                            </div>
                        </div>
                        <form onsubmit="handleEmailAuth(event)" class="space-y-6">
                            <div>
                                <label for="email" class="block text-sm font-medium text-gray-700">Email address</label>
                                <input id="email" name="email" type="email" required class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Enter your email">
                            </div>
                            <div>
                                <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                                <input id="password" name="password" type="password" required class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" placeholder="Enter your password">
                            </div>
                            <div>
                                <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                    Sign In / Sign Up
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="main-app" class="hidden">
            <div class="min-h-screen bg-gray-50">
                <nav class="bg-white shadow-sm border-b">
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div class="flex justify-between h-16">
                            <div class="flex items-center">
                                <h1 class="text-xl font-semibold text-gray-900">Academiq</h1>
                            </div>
                            <div class="flex items-center space-x-4">
                                <button onclick="signOut()" class="btn btn-ghost">
                                    Sign Out
                                </button>
                            </div>
                        </div>
                    </div>
                </nav>
                <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
                    <div class="px-4 py-6 sm:px-0">
                        <div class="text-center">
                            <h2 class="text-2xl font-bold text-gray-900 mb-4">Welcome to Academiq!</h2>
                            <p class="text-gray-600 mb-8">Your link-in-bio builder is ready to use.</p>
                            <div class="bg-blue-50 border border-blue-200 rounded-md p-4">
                                <p class="text-blue-800">🎉 Authentication is working! The app is ready for development.</p>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script>
        // Supabase configuration
        const SUPABASE_URL = 'https://natzpfyxpuycsuuzbqrd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdHpwZnl4cHV5Y3N1dXpicXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA5NTExODQsImV4cCI6MjA3NjUyNzE4NH0.q06AAoHZrfS3-O7568VpikaOtn6qAlDyDM7VR6sgzeU';
        
        // Initialize Supabase
        const { createClient } = supabase;
        const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // App state
        let currentUser = null;
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('App initializing...');
            await initApp();
        });
        
        async function initApp() {
            try {
                console.log('Checking authentication...');
                // Check for existing session
                const { data: { session } } = await supabaseClient.auth.getSession();
                
                if (session) {
                    console.log('User is authenticated:', session.user.email);
                    currentUser = session.user;
                    showDashboard();
                } else {
                    console.log('No session found, showing login');
                    showLogin();
                }
            } catch (error) {
                console.error('Auth error:', error);
                showLogin();
            }
        }
        
        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
        
        function showLogin() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
        
        function showDashboard() {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        }
        
        async function signInWithGoogle() {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({ provider: 'google' });
                if (error) {
                    console.error('Google sign-in error:', error);
                    alert('Google sign-in failed: ' + error.message);
                }
            } catch (error) {
                console.error('Google sign-in error:', error);
                alert('Google sign-in failed: ' + error.message);
            }
        }
        
        async function handleEmailAuth(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                console.log('Attempting email sign-in...');
                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                
                if (error) {
                    console.log('Sign-in failed, attempting sign-up...');
                    const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
                    
                    if (signUpError) {
                        console.error('Sign-up error:', signUpError);
                        alert('Authentication failed: ' + signUpError.message);
                    } else {
                        console.log('Account created successfully');
                        alert('Account created! Check your email for confirmation if required.');
                    }
                } else {
                    console.log('Sign-in successful');
                    currentUser = data.user;
                    showDashboard();
                }
            } catch (error) {
                console.error('Authentication error:', error);
                alert('Authentication failed: ' + error.message);
            }
        }
        
        async function signOut() {
            try {
                await supabaseClient.auth.signOut();
                currentUser = null;
                showLogin();
            } catch (error) {
                console.error('Sign-out error:', error);
            }
        }
        
        // Listen for auth state changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event, session);
            if (event === 'SIGNED_IN' && session) {
                currentUser = session.user;
                showDashboard();
            } else if (event === 'SIGNED_OUT') {
                currentUser = null;
                showLogin();
            }
        });
    </script>
</body>
</html>
