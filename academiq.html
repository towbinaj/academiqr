        async function handleLogin(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const email = formData.get('email');
            const password = formData.get('password');
            
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });
                
                if (error) throw error;
                
                currentUser = data.user;
                showDashboard();
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const displayName = formData.get('displayName');
            const email = formData.get('email');
            const password = formData.get('password');
            
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            display_name: displayName
                        },
                        emailRedirectTo: window.location.origin + '/academiq.html'
                    }
                });
                
                if (error) throw error;
                
                if (data.user) {
                    // Create profile
                    const { error: profileError } = await supabaseClient
                        .from('profiles')
                        .insert({
                            id: data.user.id,
                            handle: email.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, ''),
                            display_name: displayName
                        });
                    
                    if (profileError) {
                        console.error('Profile creation error:', profileError);
                    }
                    
                    // Check if email confirmation is required
                    if (data.user.email_confirmed_at) {
                        // Email already confirmed, go to dashboard
                        currentUser = data.user;
                        showDashboard();
                    } else {
                        // Email confirmation required
                        alert('Account created! Please check your email to verify your account.');
                        showLogin();
                    }
                }
            } catch (error) {
                alert('Registration failed: ' + error.message);
            }
        }
        
        async function signInWithGoogle() {
            try {

                    }
                });
                
                if (error) throw error;
            } catch (error) {
                alert('Google sign-in failed: ' + error.message);
            }
        }

            // Drag events only on the handle

                dragHandle.addEventListener('mousedown', startDrag);

            console.log('Added drop events to link:', linkId);
            
            // Input events for real-time preview
            const titleInput = newLink.querySelector('input[type="text"]');

        // Simple mouse-based drag and drop
        let draggedElement = null;
        let draggedIndex = -1;
        let isDragging = false;
        let dropPlaceholder = null;
        
        function startDrag(e) {
            const dragHandle = e.target.closest('.drag-handle');
            if (!dragHandle) return;
            
            draggedElement = dragHandle.closest('.link-item');
            if (!draggedElement) return;
            
            e.preventDefault();
            isDragging = true;
            
            // Get current position
            const allLinks = Array.from(document.querySelectorAll('.link-item'));
            draggedIndex = allLinks.indexOf(draggedElement);
            
            // Clean visual feedback - exactly like the reference image
            draggedElement.style.transition = 'all 0.2s ease-out';
            draggedElement.style.opacity = '0.7';
            draggedElement.style.transform = 'scale(1.0)';
            draggedElement.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
            draggedElement.style.zIndex = '1000';
            draggedElement.style.cursor = 'grabbing';
            
            console.log('Started dragging:', draggedElement.id, 'at index:', draggedIndex);
            
            // Add global mouse events
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }
        
        function handleMouseMove(e) {
            if (!isDragging || !draggedElement) return;
            
            e.preventDefault();
            
            // Find element under mouse
            const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
            const targetLink = elementBelow?.closest('.link-item');
            
            // Remove existing placeholder
            if (dropPlaceholder) {
                dropPlaceholder.remove();
                dropPlaceholder = null;
            }
            
            // Remove all highlights
            document.querySelectorAll('.link-item').forEach(link => {
                if (link !== draggedElement) {
                    link.style.backgroundColor = '';
                    link.style.borderColor = '';
                    link.style.transform = '';
                    link.style.boxShadow = '';
                }
            });
            
            // Show dashed placeholder where item will be dropped
            if (targetLink && targetLink !== draggedElement) {
                const linksList = document.getElementById('links-list');
                const allLinks = Array.from(document.querySelectorAll('.link-item'));
                const targetIndex = allLinks.indexOf(targetLink);
                const draggedIndex = allLinks.indexOf(draggedElement);
                
                // Create dashed placeholder
                dropPlaceholder = document.createElement('div');
                dropPlaceholder.style.height = '4px';
                dropPlaceholder.style.margin = '8px 0';
                dropPlaceholder.style.border = '2px dashed #3b82f6';
                dropPlaceholder.style.borderRadius = '2px';
                dropPlaceholder.style.backgroundColor = 'rgba(59, 130, 246, 0.1)';
                dropPlaceholder.style.transition = 'all 0.2s ease-out';
                
                // Insert placeholder at correct position
                if (draggedIndex < targetIndex) {
                    // Moving down - insert after target
                    linksList.insertBefore(dropPlaceholder, targetLink.nextSibling);
                } else {
                    // Moving up - insert before target
                    linksList.insertBefore(dropPlaceholder, targetLink);
                }
                
                console.log('Showing placeholder at index:', targetIndex);
            }
        }
        
        function handleMouseUp(e) {
            if (!isDragging || !draggedElement) return;
            
            e.preventDefault();
            
            // If there's a placeholder, move the element to that position
            if (dropPlaceholder) {
                const linksList = document.getElementById('links-list');
                const allLinks = Array.from(document.querySelectorAll('.link-item'));
                const currentIndex = allLinks.indexOf(draggedElement);
                
                // Find where the placeholder is
                const placeholderIndex = Array.from(linksList.children).indexOf(dropPlaceholder);
                
                if (placeholderIndex !== -1 && placeholderIndex !== currentIndex) {
                    // Move the element to the placeholder position
                    linksList.insertBefore(draggedElement, dropPlaceholder);
                    console.log('Moved element to placeholder position');
                    updateMobilePreview();
                }
            }
            
            resetDrag();
        }
        
        function resetDrag() {
            // Remove placeholder
            if (dropPlaceholder) {
                dropPlaceholder.remove();
                dropPlaceholder = null;
            }
            
            if (draggedElement) {
                // Clean reset - no transitions for immediate feedback
                draggedElement.style.opacity = '';
                draggedElement.style.transform = '';
                draggedElement.style.boxShadow = '';
                draggedElement.style.zIndex = '';
                draggedElement.style.cursor = '';
                draggedElement.style.transition = '';
            }
            
            // Remove global events
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);
            
            draggedElement = null;
            draggedIndex = -1;
            isDragging = false;
        }

        function isValidImageFile(file) {
            const validTypes = [
                'image/jpeg',
                'image/jpg', 
                'image/png',
                'image/gif',
                'image/tiff',
                'image/tif',
                'image/webp',
                'image/bmp',
                'image/svg+xml',
                'image/ico',
                'image/icon'
            ];
            
            const validExtensions = [
                '.jpg', '.jpeg', '.png', '.gif', '.tif', '.tiff', 
                '.webp', '.bmp', '.svg', '.ico', '.icon'
            ];
            
            // Check MIME type
            if (validTypes.includes(file.type.toLowerCase())) {
                return true;
            }
            
            // Check file extension as fallback
            const extension = getFileExtension(file.name).toLowerCase();
            return validExtensions.includes(extension);

            const img = document.getElementById('edit-image');

            img.removeEventListener('mousemove', handleCropMove);
            img.removeEventListener('mouseup', handleCropEnd);
            
            // Add new event listeners
            img.addEventListener('mousedown', handleCropStart);
            img.addEventListener('mousemove', handleCropMove);
            img.addEventListener('mouseup', handleCropEnd);
        }
        
        function handleCropStart(e) {
            if (!window.isCropping) return;
            e.preventDefault();
            e.stopPropagation();
            
            // Remove any existing crop overlay
            if (window.cropOverlay) {
                window.cropOverlay.remove();
            }
            
            const rect = e.target.getBoundingClientRect();
            window.cropStartX = e.clientX - rect.left;
            window.cropStartY = e.clientY - rect.top;
            
            // Create crop overlay
            window.cropOverlay = document.createElement('div');
            window.cropOverlay.style.position = 'absolute';
            window.cropOverlay.style.border = '2px dashed #3b82f6';
            window.cropOverlay.style.backgroundColor = 'rgba(59, 130, 246, 0.1)';
            window.cropOverlay.style.pointerEvents = 'none';
            window.cropOverlay.style.zIndex = '20';
            window.cropOverlay.style.left = window.cropStartX + 'px';
            window.cropOverlay.style.top = window.cropStartY + 'px';
            window.cropOverlay.style.width = '0px';
            window.cropOverlay.style.height = '0px';
            
            const imgContainer = e.target.parentElement;
            imgContainer.style.position = 'relative';
            imgContainer.appendChild(window.cropOverlay);
            
            console.log('Crop started at:', window.cropStartX, window.cropStartY);
        }
        
        function handleCropMove(e) {
            if (!window.isCropping || !window.cropOverlay) return;
            
            const rect = e.target.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;
            
            const left = Math.min(window.cropStartX, currentX);
            const top = Math.min(window.cropStartY, currentY);
            const width = Math.abs(currentX - window.cropStartX);
            const height = Math.abs(currentY - window.cropStartY);
            
            window.cropOverlay.style.left = left + 'px';
            window.cropOverlay.style.top = top + 'px';
            window.cropOverlay.style.width = width + 'px';
            window.cropOverlay.style.height = height + 'px';
        }
        
        function handleCropEnd(e) {
            if (!window.isCropping || !window.cropOverlay) return;
            
            const img = document.getElementById('edit-image');
            const rect = e.target.getBoundingClientRect();
            window.cropEndX = e.clientX - rect.left;
            window.cropEndY = e.clientY - rect.top;
            
            // Only keep crop if it has meaningful size
            const width = Math.abs(window.cropEndX - window.cropStartX);
            const height = Math.abs(window.cropEndY - window.cropStartY);
            
            if (width < 10 || height < 10) {
                window.cropOverlay.remove();
                window.cropOverlay = null;
                console.log('Crop too small, removed');
                return;
            }
            
            console.log('Crop ended at:', window.cropEndX, window.cropEndY);
            console.log('Crop area:', {
                left: Math.min(window.cropStartX, window.cropEndX),
                top: Math.min(window.cropStartY, window.cropEndY),
                width: width,
                height: height
            });
            
            // Disable further cropping until apply/cancel
            window.isCropping = false;
            img.style.cursor = 'default';
        }
        
        function applyCrop() {
            if (!window.cropOverlay) {
                alert('Please select a crop area first');
                return;
            }
            
            const img = document.getElementById('edit-image');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // Get crop dimensions
            const cropLeft = parseInt(window.cropOverlay.style.left);
            const cropTop = parseInt(window.cropOverlay.style.top);
            const cropWidth = parseInt(window.cropOverlay.style.width);
            const cropHeight = parseInt(window.cropOverlay.style.height);
            
            // Set canvas size to crop size
            canvas.width = cropWidth;
            canvas.height = cropHeight;
            
            // Calculate scale factor (image might be scaled down in display)
            const imgRect = img.getBoundingClientRect();
            const scaleX = img.naturalWidth / imgRect.width;
            const scaleY = img.naturalHeight / imgRect.height;
            
            // Calculate actual crop coordinates on the original image
            const actualLeft = cropLeft * scaleX;
            const actualTop = cropTop * scaleY;
            const actualWidth = cropWidth * scaleX;
            const actualHeight = cropHeight * scaleY;
            
            // Draw cropped portion to canvas
            ctx.drawImage(
                img,
                actualLeft, actualTop, actualWidth, actualHeight,
                0, 0, cropWidth, cropHeight
            );
            
            // Convert canvas to blob and update image
            canvas.toBlob(function(blob) {
                const newUrl = URL.createObjectURL(blob);
                img.src = newUrl;
                
                // Update the file in media library
                const file = window.currentEditingFile;
                if (file) {
                    file.url = newUrl;
                    // Update the thumbnail in the media library
                    renderMediaGrid();
                }
                
                console.log('Crop applied successfully');
            }, 'image/png');
            
            // Remove crop overlay
            window.cropOverlay.remove();
            window.cropOverlay = null;
            
            window.isCropping = false;
            document.getElementById('apply-crop').disabled = true;
            document.getElementById('cancel-crop').disabled = true;
            
            img.style.cursor = 'default';
            
            // Remove event listeners
            img.removeEventListener('mousedown', handleCropStart);
            img.removeEventListener('mousemove', handleCropMove);
            img.removeEventListener('mouseup', handleCropEnd);
        }

            let filteredFiles = currentFiles;

                // Filter by file type
                filteredFiles = currentFiles.filter(file => {
                    const extension = file.extension.toLowerCase();
                    switch(filter) {
                        case 'jpg': return ['jpg', 'jpeg'].includes(extension);
                        case 'png': return extension === 'png';
                        case 'gif': return extension === 'gif';
                        case 'tif': return ['tif', 'tiff'].includes(extension);
                        case 'webp': return extension === 'webp';
                        case 'svg': return extension === 'svg';
                        default: return true;
                    }

                // Sort by upload date, most recent first
                filteredFiles = currentFiles.sort((a, b) => new Date(b.uploadedAt) - new Date(a.uploadedAt));

        function applyQuickGradient(gradientText) {

        function parseGradientText(gradientText) {
            // Extract direction
            const directionMatch = gradientText.match(/linear-gradient\(([^,]+),/);
            if (directionMatch) {
                currentTheme.gradientDirection = directionMatch[1].trim();
            }
            
            // Extract color stops
            const stopsMatch = gradientText.match(/linear-gradient\([^,]+,(.+)\)/);
            if (stopsMatch) {
                const stopsText = stopsMatch[1];
                const stopMatches = stopsText.match(/#[a-fA-F0-9]{6}\s*(\d+%)?/g);
                
                if (stopMatches) {
                    currentTheme.gradientStops = stopMatches.map((stop, index) => {
                        const colorMatch = stop.match(/#[a-fA-F0-9]{6}/);
                        const positionMatch = stop.match(/(\d+)%/);
                        
                        return {
                            color: colorMatch ? colorMatch[0] : '#000000',
                            position: positionMatch ? parseInt(positionMatch[1]) : (index * 100 / (stopMatches.length - 1))
                        };
                    });
                }
            }
        }

            if (currentTheme.type === 'gradient') {

                stopDiv.innerHTML = `

                    <input type="number" value="${stop.position}" min="0" max="100" class="w-16 px-2 py-1 border border-gray-300 rounded text-sm" onchange="updateGradientStop(${index}, 'position', this.value)">
                    <span class="text-sm text-gray-600">%</span>
                    ${currentTheme.gradientStops.length > 2 ? `<button onclick="removeGradientStop(${index})" class="text-red-500 hover:text-red-700 text-sm">×</button>` : ''}
                `;
                container.appendChild(stopDiv);
            });
        }
        
        function updateGradientStop(index, property, value) {
            if (property === 'color') {
                currentTheme.gradientStops[index].color = value;
            } else if (property === 'position') {
                currentTheme.gradientStops[index].position = parseInt(value);
            }
            
            updateGradientFromStops();
        }
        
        function addGradientStop() {
            const newPosition = currentTheme.gradientStops.length > 0 ? 
                Math.round((currentTheme.gradientStops[currentTheme.gradientStops.length - 1].position + 100) / 2) : 50;
            
            currentTheme.gradientStops.push({
                color: '#ffffff',
                position: newPosition
            });
            
            // Sort by position
            currentTheme.gradientStops.sort((a, b) => a.position - b.position);
            
            renderGradientStops();
            updateGradientFromStops();
        }
        
        function removeGradientStop(index) {
            if (currentTheme.gradientStops.length > 2) {
                currentTheme.gradientStops.splice(index, 1);
                renderGradientStops();

            }
        }

            const stopsText = currentTheme.gradientStops.map(stop => 
                `${stop.color} ${stop.position}%`
            ).join(', ');
            
            currentTheme.gradientText = `linear-gradient(${currentTheme.gradientDirection}, ${stopsText})`;

            currentTheme.autoContrast = document.getElementById('autoContrast').checked;
            currentTheme.textColor = document.getElementById('textColor').value || null;
            updatePreview();
        }
        
        function updateTextFromText() {
            const colorText = document.getElementById('textColorText').value;
            if (colorText && /^#[0-9A-F]{6}$/i.test(colorText)) {
                currentTheme.textColor = colorText;
                document.getElementById('textColor').value = colorText;
                updatePreview();
            }
        }
        
        function updatePreview() {
            const preview = document.getElementById('theme-preview');
            if (!preview) return;
            
            let backgroundStyle = '';
            
            if (currentTheme.type === 'solid') {
                backgroundStyle = `background-color: ${currentTheme.color};`;
            } else if (currentTheme.type === 'gradient') {
                backgroundStyle = `background: ${currentTheme.gradientText};`;
            } else if (currentTheme.type === 'image' && currentTheme.image) {
                const blurStyle = currentTheme.blur ? 'filter: blur(2px);' : '';
                backgroundStyle = `background-image: url(${currentTheme.image}); background-position: ${currentTheme.position}; background-size: ${currentTheme.size}; background-repeat: no-repeat; ${blurStyle}`;
            }
            
            // Determine text color
            let textColor = '#000000';
            if (currentTheme.textColor) {
                textColor = currentTheme.textColor;
            } else if (currentTheme.autoContrast) {
                // Simple contrast calculation
                if (currentTheme.type === 'solid') {
                    const rgb = hexToRgb(currentTheme.color);
                    const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
                    textColor = brightness > 128 ? '#000000' : '#ffffff';
                } else {
                    textColor = '#ffffff'; // Default for gradients and images
                }
            }
            
            preview.style.cssText = backgroundStyle + `color: ${textColor};`;
            preview.innerHTML = `
                <div class="text-center">
                    <h3 class="text-xl font-bold mb-2">Your Link List</h3>
                    <p class="text-sm mb-4">This is how your link list will look</p>
                    <div class="space-y-2">
                        <div class="bg-white bg-opacity-20 rounded-lg p-3 text-left">
                            <div class="font-medium">Sample Link 1</div>
                            <div class="text-sm opacity-80">Description of your link</div>
                        </div>
                        <div class="bg-white bg-opacity-20 rounded-lg p-3 text-left">
                            <div class="font-medium">Sample Link 2</div>
                            <div class="text-sm opacity-80">Another link description</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }
        
        function resetTheme() {
            currentTheme = {
                type: 'solid',
                color: '#ffffff',
                gradientText: 'linear-gradient(45deg, #ff6b6b, #4ecdc4)',
                gradientStops: [
                    { color: '#ff6b6b', position: 0 },
                    { color: '#4ecdc4', position: 100 }
                ],
                gradientDirection: '45deg',
                image: null,
                position: 'center',
                size: 'cover',
                blur: false,
                autoContrast: true,
                textColor: null
            };
            
            // Reset form
            document.querySelector('input[name="bgType"][value="solid"]').checked = true;
            document.getElementById('bgColor').value = '#ffffff';
            document.getElementById('bgColorText').value = '#ffffff';
            document.getElementById('gradientText').value = 'linear-gradient(45deg, #ff6b6b, #4ecdc4)';
            document.getElementById('gradientDirection').value = '45deg';
            document.getElementById('customAngle').value = '';
            document.getElementById('bgPosition').value = 'center';
            document.getElementById('bgSize').value = 'cover';
            document.getElementById('bgBlur').checked = false;
            document.getElementById('autoContrast').checked = true;
            document.getElementById('textColor').value = '#000000';
            document.getElementById('textColorText').value = '#000000';
            
            updateBackgroundType();
            renderGradientStops();
        }
        
        function previewTheme() {
            // This would open a full preview modal or navigate to preview mode
            alert('Full preview would open here - showing your link list with the selected theme!');
        }
        
        function updateMobilePreview() {
            const preview = document.getElementById('mobile-preview');
            const linksList = document.getElementById('links-list');
            const links = linksList.querySelectorAll('.draggable-link');
            
            if (links.length === 0) {
                preview.innerHTML = `
                    <div class="text-center text-gray-500 py-8">
                        Mobile preview coming soon...
                    </div>
                `;
                return;
            }
            
            let previewHTML = `
                <div class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-96 rounded-lg p-4">
                    <div class="text-center mb-6">
                        <div class="w-16 h-16 bg-gray-300 rounded-full mx-auto mb-2"></div>
                        <h2 class="text-lg font-semibold text-gray-900">Your Name</h2>
                        <p class="text-sm text-gray-600">Your description</p>
                    </div>
                    <div class="space-y-3">
            `;
            
            links.forEach((link, index) => {
                const titleInput = link.querySelector('input[type="text"]');
                const urlInput = link.querySelector('input[type="url"]');
                const title = titleInput ? titleInput.value : 'New Link';
                const url = urlInput ? urlInput.value : '#';
                
                previewHTML += `
                    <div class="bg-white rounded-lg p-3 shadow-sm">
                        <div class="flex items-center space-x-3">
                            <div class="w-10 h-10 bg-gray-200 rounded flex items-center justify-center">
                                <span class="text-gray-400 text-sm">📷</span>
                            </div>
                            <div class="flex-1 min-w-0">
                                <div class="text-sm font-medium text-gray-900 truncate">${title}</div>
                                <div class="text-xs text-gray-500 truncate">${url}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            previewHTML += `
                    </div>
                </div>
            `;
            
            preview.innerHTML = previewHTML;
        }
