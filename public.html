    <script>
        // Security utility functions
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Validate and sanitize image URL to prevent XSS
        function sanitizeImageUrl(url) {
            if (!url || typeof url !== 'string') {
                return null;
            }
            
            // Trim whitespace
            url = url.trim();
            
            // Only allow http://, https://, or data:image/ URLs
            // Block javascript:, vbscript:, and other dangerous protocols
            const allowedProtocols = /^(https?:\/\/|data:image\/)/i;
            if (!allowedProtocols.test(url)) {
                console.warn('Invalid image URL protocol:', url);
                return null;
            }
            
            // Additional validation: ensure URL doesn't contain script injection attempts
            // Check for common XSS patterns in URLs
            const dangerousPatterns = [
                /javascript:/i,
                /vbscript:/i,
                /onerror=/i,
                /onload=/i,
                /onclick=/i,
                /<script/i,
                /&#/i, // HTML entities that could be used for XSS
            ];
            
            for (const pattern of dangerousPatterns) {
                if (pattern.test(url)) {
                    console.warn('Potentially dangerous image URL detected:', url);
                    return null;
                }
            }
            
            return url;
        }

        // Sanitize CSS transform values to prevent CSS injection
        function sanitizeTransformValue(value, min, max, defaultValue) {
            if (typeof value !== 'number') {
                value = parseFloat(value);
            }
            
            if (isNaN(value)) {
                return defaultValue;
            }
            
            // Clamp value between min and max
            value = Math.max(min, Math.min(max, value));
            
            return value;
        }

        // Validate and sanitize URL for social media links
        // Only allows http:// and https:// protocols
        function sanitizeUrl(url) {
            if (!url || typeof url !== 'string') {
                return null;
            }
            
            // Trim whitespace
            url = url.trim();
            
            // Only allow http:// or https:// URLs
            // Block javascript:, vbscript:, data:, and other dangerous protocols
            const allowedProtocols = /^https?:\/\//i;
            if (!allowedProtocols.test(url)) {
                console.warn('Invalid URL protocol:', url);
                return null;
            }
            
            // Additional validation: ensure URL doesn't contain script injection attempts
            const dangerousPatterns = [
                /javascript:/i,
                /vbscript:/i,
                /data:/i,
                /onerror=/i,
                /onload=/i,
                /onclick=/i,
                /<script/i,
            ];
            
            for (const pattern of dangerousPatterns) {
                if (pattern.test(url)) {
                    console.warn('Potentially dangerous URL detected:', url);
                    return null;
                }
            }
            
            return url;
        }

        // Validate email address format
        function isValidEmail(email) {
            if (!email || typeof email !== 'string') {
                return false;
            }
            
            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email.trim());
        }

        // Sanitize HTML to prevent XSS attacks
        // Only allows safe formatting tags: <strong>, <em>, <u>, <b>, <i>
        // All other HTML tags and attributes are stripped
        function sanitizeHTML(html) {
            if (!html || typeof html !== 'string') {
                return '';
            }
            
            // Use DOMParser to safely parse HTML
            // This prevents script execution during parsing
            try {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // List of allowed HTML tags for formatting
                const allowedTags = ['strong', 'em', 'u', 'b', 'i'];
                
                // Recursively process nodes, keeping only allowed tags
                function processNode(node) {
                    if (node.nodeType === Node.TEXT_NODE) {
                        // Text nodes are safe - return as-is (textContent automatically escapes HTML)
                        return node.textContent;
                    }
                    
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        const tagName = node.tagName.toLowerCase();
                        
                        if (allowedTags.includes(tagName)) {
                            // Keep this allowed tag, process children recursively
                            const children = Array.from(node.childNodes)
                                .map(processNode)
                                .join('');
                            // Return tag without attributes (strip all attributes for security)
                            return `<${tagName}>${children}</${tagName}>`;
                        } else {
                            // Strip this disallowed tag, but keep its children
                            return Array.from(node.childNodes)
                                .map(processNode)
                                .join('');
                        }
                    }
                    
                    // Ignore other node types (comments, etc.)
                    return '';
                }
                
                // Process all nodes in the document body
                const bodyContent = Array.from(doc.body.childNodes)
                    .map(processNode)
                    .join('');
                
                // Return sanitized content, or plain text if parsing resulted in empty content
                return bodyContent || html.replace(/<[^>]+>/g, '');
            } catch (e) {
                // If parsing fails for any reason, strip all HTML tags as fallback
                // This ensures we never return potentially dangerous HTML
                return html.replace(/<[^>]+>/g, '');

        }

        // Supabase configuration

        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdHpwZnl4cHV5Y3N1dXpicXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA5NTExODQsImV4cCI6MjA3NjUyNzE4NH0.q06AAoHZrfS3-O7568VpikaOtn6qAlDyDM7VR6sgzeU';

        // Validate UUID format (for collectionId)
        function isValidUUID(uuid) {
            if (!uuid || typeof uuid !== 'string') {
                return false;
            }
            // UUID v4 format: 8-4-4-4-12 hexadecimal characters
            const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
            return uuidRegex.test(uuid.trim());
        }

        // Validate user ID format (12 alphanumeric characters - first 12 chars of UUID)
        // Also handles legacy formats that may include hyphens or be shorter
        function isValidUserId(userId) {
            if (!userId || typeof userId !== 'string') {
                return false;
            }
            
            const trimmed = userId.trim();
            
            // Remove hyphens (handle legacy formats)
            const withoutHyphens = trimmed.replace(/-/g, '');
            
            // Should be at least 8 hexadecimal characters (minimum for a valid prefix)
            // Allow up to 14 chars to handle legacy formats gracefully
            // This handles cases where user IDs might be incomplete or in different formats
            const userIdRegex = /^[0-9a-f]{8,14}$/i;
            
            if (!userIdRegex.test(withoutHyphens)) {
                return false;
            }
            
            // Extract first 12 characters if available, otherwise use what we have
            // Don't pad - use the actual user ID as-is for comparison
            return withoutHyphens.substring(0, 12);
        }

        // Get URL parameters (needed for validation and error logging)
        const urlParams = new URLSearchParams(window.location.search);

        // Validate and sanitize URL parameters
        function validateUrlParameters() {
            const rawUserId = urlParams.get('user');
            const rawCollectionId = urlParams.get('collection');
            
            // Validate and normalize userId
            if (!rawUserId) {
                return {
                    valid: false,
                    error: 'Missing user ID parameter.',
                    userId: null,
                    collectionId: null
                };
            }
            
            const normalizedUserId = isValidUserId(rawUserId);
            if (!normalizedUserId) {
                return {
                    valid: false,
                    error: 'Invalid user ID format. User ID must contain at least 12 hexadecimal characters.',
                    userId: null,
                    collectionId: null
                };
            }
            
            // Validate collectionId
            if (!rawCollectionId || !isValidUUID(rawCollectionId)) {
                return {
                    valid: false,
                    error: 'Invalid collection ID format. Collection ID must be a valid UUID.',
                    userId: null,
                    collectionId: null
                };
            }
            
            // Return validated and sanitized parameters
            // Note: We normalize to lowercase for consistency, but keep original for database queries
            // UUIDs in database may be in different cases, so we'll do case-insensitive comparisons
            return {
                valid: true,
                error: null,
                userId: normalizedUserId.toLowerCase(), // Normalized to first 12 hex chars, lowercase
                collectionId: rawCollectionId.trim() // Keep original case for UUID (database handles case-insensitive)
            };
        }

        // Get and validate URL parameters
        const urlValidation = validateUrlParameters();
        const userId = urlValidation.userId;
        const collectionId = urlValidation.collectionId;

        // Check if passkey is valid for this collection
        function getStoredPasskey(collectionId) {
            try {
                const stored = sessionStorage.getItem(`passkey_${collectionId}`);
                return stored || null;
            } catch (e) {
                return null;
            }
        }

        // Store passkey in sessionStorage
        function storePasskey(collectionId, passkey) {
            try {
                sessionStorage.setItem(`passkey_${collectionId}`, passkey);
            } catch (e) {
                console.warn('Failed to store passkey:', e);
            }
        }

        // Show passkey modal
        function showPasskeyModal(collectionId, correctPasskey, onSuccess) {
            const modal = document.getElementById('passkey-modal');
            const input = document.getElementById('passkey-input');
            const error = document.getElementById('passkey-error');
            const submitBtn = document.getElementById('passkey-submit');
            const phoneScreen = document.querySelector('.phone-screen');
            
            if (!modal || !input || !error || !submitBtn) {
                console.error('Passkey modal elements not found');
                return;
            }
            
            // Hide content while passkey modal is shown (security: prevent content preview)
            if (phoneScreen) {
                phoneScreen.style.display = 'none';
            }
            
            // Reset modal state
            input.value = '';
            error.style.display = 'none';
            modal.style.display = 'block';
            input.focus();
            
            // Handle submit
            const handleSubmit = () => {
                const enteredPasskey = input.value.trim();
                
                if (!enteredPasskey) {
                    error.textContent = 'Please enter a passkey.';
                    error.style.display = 'block';
                    return;
                }
                
                // Validate passkey (case-sensitive comparison)
                if (enteredPasskey === correctPasskey) {
                    // Store passkey for this session
                    storePasskey(collectionId, enteredPasskey);
                    
                    // Hide modal
                    modal.style.display = 'none';
                    
                    // Show content after passkey is validated
                    const phoneScreenElement = document.querySelector('.phone-screen');
                    if (phoneScreenElement) {
                        phoneScreenElement.style.display = '';
                    }
                    
                    // Call success callback
                    if (onSuccess) {
                        onSuccess();
                    }
                } else {
                    // Incorrect passkey
                    error.textContent = 'Incorrect passkey. Please try again.';
                    error.style.display = 'block';
                    input.value = '';
                    input.focus();
                }
            };
            
            // Submit on button click
            submitBtn.onclick = handleSubmit;
            
            // Submit on Enter key

        // Load profile and collection data
        async function loadProfile() {
            try {
                // Check if URL parameters are valid
                if (!urlValidation.valid) {
                    showError(urlValidation.error || 'Invalid URL parameters');
                    console.error('URL parameter validation failed:', urlValidation.error);
                    console.error('Raw userId:', urlParams.get('user'), 'Raw collectionId:', urlParams.get('collection'));
                    return;
                }
                
                if (!userId || !collectionId) {
                    showError('Missing required URL parameters');
                    console.error('Missing user ID or collection ID parameter');
                    return;
                }
                
                // Load collection by ID (Supabase handles UUID case-insensitively)
                // Only select needed fields to reduce payload size
                const { data: collection, error: collectionError } = await supabase
                        .from('link_lists')
                    .select('id, owner_id, slug, visibility, passkey, theme, presentation_data')
                    .eq('id', collectionId)
                    .single();

                if (collectionError) {
                    console.error('Error loading collection:', collectionError);
                    return;
                }

                if (!collection) {
                    console.error('No collection found with ID:', collectionId);
                    return;
                }

                // Verify that the collection owner matches the provided user ID
                // This adds a security check to ensure users can only access their own collections
                // Compare case-insensitively since UUIDs can be in different cases
                // Normalize both sides by removing hyphens for consistent comparison
                if (!collection.owner_id) {
                    console.error('Collection has no owner ID');
                    return;
                }

                // Normalize owner ID the same way we normalize user ID (remove hyphens, take first 12 chars)
                const ownerIdWithoutHyphens = collection.owner_id.replace(/-/g, '');
                const ownerIdPrefix = ownerIdWithoutHyphens.substring(0, 12).toLowerCase();
                const normalizedUserId = userId.toLowerCase();

                // Check if owner ID prefix matches user ID (both are normalized the same way)
                // Use prefix matching to handle user IDs that might be shorter than 12 characters
                const ownerStartsWithUser = ownerIdPrefix.startsWith(normalizedUserId);
                const userStartsWithOwner = normalizedUserId.startsWith(ownerIdPrefix);
                
                if (!ownerStartsWithUser && !userStartsWithOwner) {
                    console.error('Collection owner does not match user ID');
                    console.error('Owner ID prefix (normalized):', ownerIdPrefix, 'User ID (normalized):', normalizedUserId);
                    return;
                }

                // Check if collection requires passkey authentication
                if (collection.passkey && collection.passkey.trim() !== '') {
                    // Collection is passkey-protected
                    const storedPasskey = getStoredPasskey(collectionId);

                    if (storedPasskey === collection.passkey) {
                        // Passkey already validated in this session, proceed to load content
                        await loadCollectionContent(collection);
                } else {
                        // Show passkey prompt
                        showPasskeyModal(collectionId, collection.passkey, async () => {
                            // Passkey validated, now load content
                            await loadCollectionContent(collection);
                        });
                        return; // Don't load content until passkey is validated
                    }
                } else {
                    // No passkey required, load content normally
                    await loadCollectionContent(collection);
                }
            } catch (error) {
                console.error('Error in loadProfile:', error);
            }
        }

        // Load collection content (separated for passkey flow)
        async function loadCollectionContent(collection) {
            try {

                trackPageView(collection.id, collection.owner_id).catch(err => {

                // Load links and profile in parallel for faster loading

                        .eq('list_id', collection.id)
                        .order('order_index', { ascending: true }),

        function renderProfile(profile) {
            // Display name FIRST (most important - show immediately)
            const displayName = document.getElementById('preview-name');
            if (displayName) {
                let name = 'User';
                if (profile && profile.display_name && profile.display_name.trim() !== '') {
                    name = profile.display_name;
                } else if (profile && profile.handle && profile.handle.trim() !== '') {
                    name = profile.handle;
                }
                displayName.textContent = name;
                // Apply dynamic font size based on text length
                if (typeof applyDynamicDisplayNameSize === 'function') {
                    applyDynamicDisplayNameSize(displayName);
                }
            }

            // Social links (render early for better perceived performance)
            renderSocialLinks(profile);

            // Profile photo (load asynchronously - doesn't block name display)
            const profilePhoto = document.getElementById('preview-avatar');
            if (profile.profile_photo) {
                // Sanitize and validate image URL to prevent XSS
                const sanitizedUrl = sanitizeImageUrl(profile.profile_photo);
                
                if (!sanitizedUrl) {
                    // Invalid URL - show default avatar
                    profilePhoto.textContent = '👤';
                    return;
                }
                
                // Create img element using DOM methods (safer than innerHTML)
                const img = document.createElement('img');
                img.src = sanitizedUrl; // Safe: URL has been validated
                img.alt = 'Profile'; // Static, safe value
                
                // Apply base photo styles
                img.style.setProperty('width', '100%', 'important');
                img.style.setProperty('height', '100%', 'important');
                img.style.setProperty('border-radius', '50%', 'important');
                img.style.setProperty('object-fit', 'cover', 'important');
                img.style.setProperty('display', 'block', 'important');
                
                // Apply photo positioning if available (with sanitization)
                if (profile.profile_photo_position) {
                    try {
                        const position = JSON.parse(profile.profile_photo_position);
                        
                        // Sanitize scale (0.1 to 5.0, default 1.0)
                        const scale = sanitizeTransformValue(position.scale, 10, 500, 100) / 100;
                        
                        // Sanitize x and y (0 to 100, default 50)
                        const x = sanitizeTransformValue(position.x, 0, 100, 50);
                        const y = sanitizeTransformValue(position.y, 0, 100, 50);
                        
                        // Calculate pan values using the same formula as the main editor
                        const panX = (x - 50) * -1;
                        const panY = (y - 50) * -1;
                        
                        // Apply transform for positioning and scaling (values are sanitized)
                        img.style.setProperty('transform', `translate(${panX}%, ${panY}%) scale(${scale})`, 'important');
                        img.style.setProperty('transform-origin', 'center center', 'important');
                        
                    } catch (e) {
                        // If parsing fails, just use default positioning (no transform)
                        console.warn('Could not parse profile photo position:', e);
                    }
                }
                
                // Clear existing content and append the safe img element
                profilePhoto.textContent = '';
                profilePhoto.appendChild(img);
            } else {
                profilePhoto.textContent = '👤';
                }
        }

        function loadPresentationInfo(collection, profileData) {
            if (!collection.presentation_data) return;

            const presentationData = collection.presentation_data;
            
            // Check if presentation data contains display name
            if (presentationData.displayName && presentationData.displayName.trim() !== '') {
                const displayName = document.getElementById('preview-name');
                if (displayName) {
                    displayName.textContent = presentationData.displayName;
                    // Apply dynamic font size based on text length
                    if (typeof applyDynamicDisplayNameSize === 'function') {
                        applyDynamicDisplayNameSize(displayName);
                    }
                }
            }
            
            // Title
            if (presentationData.title && presentationData.displayTitle !== false) {
                const titleField = document.getElementById('preview-info-title');
                const titleValue = document.getElementById('preview-title');
                if (titleField && titleValue) {
                    titleValue.textContent = presentationData.title;
                    titleField.style.display = 'block';
                }
            }
            
            // Conference
            if (presentationData.conference && presentationData.displayConference !== false) {
                const conferenceField = document.getElementById('preview-info-conference');
                const conferenceValue = document.getElementById('preview-conference');
                if (conferenceField && conferenceValue) {
                    conferenceValue.textContent = presentationData.conference;
                    conferenceField.style.display = 'block';
                }
            }
            
            // Location
            if (presentationData.location) {
                const locationField = document.getElementById('preview-info-location');
                const locationValue = document.getElementById('preview-location');
                if (locationField && locationValue) {
                    locationValue.textContent = presentationData.location;
                    locationField.style.display = 'block';
                }
            }
            
            // Date
            if (presentationData.date) {
                const dateField = document.getElementById('preview-info-date');
                const dateValue = document.getElementById('preview-date');
                if (dateField && dateValue) {
                    // Format date to match live preview: "Month Day, Year" (e.g., "January 15, 2024")
                    const date = new Date(presentationData.date);
                    const options = { year: 'numeric', month: 'long', day: 'numeric' };
                    const formattedDate = date.toLocaleDateString('en-US', options);
                    dateValue.textContent = formattedDate;
                    dateField.style.display = 'block';
                }
            }
            
            // Check if any fields are visible, and adjust spacing dynamically
            const dynamicInfoContainer = document.getElementById('preview-dynamic-info');
            if (dynamicInfoContainer) {
                const fields = [
                    document.getElementById('preview-info-title'),
                    document.getElementById('preview-info-conference'),
                    document.getElementById('preview-info-location'),
                    document.getElementById('preview-info-date')
                ];
                
                // Count visible fields
                const visibleFieldsCount = fields.filter(field => {
                    return field && field.style.display === 'block';
                }).length;
                
                if (visibleFieldsCount === 0) {
                    // No fields visible - hide container completely
                    dynamicInfoContainer.style.display = 'none';
                    dynamicInfoContainer.style.marginBottom = '0';
                } else {
                    // Show container and adjust margin based on number of visible fields
                    dynamicInfoContainer.style.display = 'block';
                    
                    // Dynamic spacing: more fields = more space, fewer fields = less space
                    // 1 field: 8px, 2 fields: 12px, 3+ fields: 16px
                    let marginBottom;
                    if (visibleFieldsCount === 1) {
                        marginBottom = '8px';
                    } else if (visibleFieldsCount === 2) {
                        marginBottom = '12px';
                    } else {
                        marginBottom = '16px';
                    }
                    dynamicInfoContainer.style.marginBottom = marginBottom;
                }
            }
        }

        // Calculate dynamic font size for display name based on text length
        // Minimum size is 1.25rem (20px) to ensure readability even for long names
        function calculateDisplayNameFontSize(text, maxSize = '1.75rem', minSize = '1.25rem') {
            if (!text || text.trim().length === 0) {
                return maxSize;
            }
            
            const textLength = text.length;
            const maxSizeValue = parseFloat(maxSize); // Extract numeric value
            const maxSizeUnit = maxSize.replace(/[0-9.]/g, ''); // Extract unit (rem, px, etc.)
            const minSizeValue = parseFloat(minSize); // Extract numeric value for minimum
            const minSizeUnit = minSize.replace(/[0-9.]/g, ''); // Extract unit for minimum
            
            // Ensure both sizes use the same unit (convert minSize to match maxSize unit if needed)
            let minSizeConverted = minSizeValue;
            if (minSizeUnit !== maxSizeUnit) {
                // If units don't match, assume both are rem (default)
                minSizeConverted = minSizeValue;
            }
            
            // Define breakpoints for font size scaling
            // Short names (0-15 chars): use max size (but ensure at least 1.5rem for readability)
            // Medium names (16-25 chars): scale down gradually
            // Long names (26+ chars): use minimum size (1.25rem)
            let fontSize;
            
            // Ensure max size is at least 1.5rem (24px) for readability
            const minMaxSize = 1.5; // 1.5rem minimum for max size
            const effectiveMaxSize = Math.max(maxSizeValue, minMaxSize);
            
            if (textLength <= 15) {
                // Short names: use maximum size (but ensure at least 1.5rem)
                fontSize = effectiveMaxSize;
            } else if (textLength <= 25) {
                // Medium names: scale down proportionally
                // Formula: maxSize - ((textLength - 15) / 10) * (maxSize - minSize)
                const scaleFactor = (textLength - 15) / 10; // 0 to 1 for 16-25 chars
                fontSize = effectiveMaxSize - (scaleFactor * (effectiveMaxSize - minSizeConverted));
            } else {
                // Long names: use minimum size (1.25rem)
                fontSize = minSizeConverted;
            }
            
            // Ensure fontSize never goes below minimum
            if (fontSize < minSizeConverted) {
                fontSize = minSizeConverted;
            }
            
            // Ensure short names (<= 15 chars) never go below 1.5rem for readability
            if (textLength <= 15 && fontSize < 1.5) {
                fontSize = 1.5;
            }
            
            // Round to 2 decimal places and add unit
            return Math.round(fontSize * 100) / 100 + maxSizeUnit;
        }

        // Apply dynamic font size to display name element
        // Accepts optional theme parameter to get max font size
        function applyDynamicDisplayNameSize(nameElement, themeParam) {
            if (!nameElement) return;
            
            try {
                const nameText = nameElement.textContent || '';
                // Always use 1.75rem as default max size for display name (matching index.html)
                // Don't use textFontSize from theme as it's meant for other text elements
                let maxSize = '1.75rem';
                
                // Ensure max size is at least 1.5rem for readability
                const maxSizeValue = parseFloat(maxSize);
                const maxSizeUnit = maxSize.replace(/[0-9.]/g, '') || 'rem';
                const minMaxSize = 1.5; // Minimum max size for readability
                
                // If somehow maxSize is smaller than 1.5rem, use 1.5rem instead
                if (maxSizeValue < minMaxSize) {
                    maxSize = minMaxSize + maxSizeUnit;
                }
                
                // Minimum size is 1.25rem (matching index.html)
                const minSize = '1.25rem';
                const dynamicSize = calculateDisplayNameFontSize(nameText, maxSize, minSize);
                console.log('applyDynamicDisplayNameSize:', {
                    nameText: nameText,
                    nameLength: nameText.length,
                    maxSize: maxSize,
                    minSize: minSize,
                    calculatedSize: dynamicSize
                });
                // Apply font size with maximum priority
                nameElement.style.setProperty('font-size', dynamicSize, 'important');
                // Also set directly to ensure it's applied
                nameElement.style.fontSize = dynamicSize;
                // Force a reflow to ensure browser applies the style
                void nameElement.offsetHeight;
                
                // Double-check and re-apply if needed (for stubborn cases)
                setTimeout(() => {
                    const computedSize = window.getComputedStyle(nameElement).fontSize;
                    const computedSizeValue = parseFloat(computedSize);
                    const expectedSizeValue = parseFloat(dynamicSize);
                    // If computed size is smaller than expected, force re-apply
                    if (computedSizeValue < expectedSizeValue - 0.1) {
                        console.warn('Font size not applied correctly, re-applying. Computed:', computedSize, 'Expected:', dynamicSize);
                        nameElement.style.setProperty('font-size', dynamicSize, 'important');
                        nameElement.style.fontSize = dynamicSize;
                    }
                }, 100);
            } catch (error) {
                console.error('Error applying dynamic display name size:', error);
                // Fallback to default size if there's an error
                nameElement.style.setProperty('font-size', '1.75rem', 'important');
            }
        }

        // Track page view function
        async function trackPageView(listId, ownerId) {
            try {
                // Get visitor information
                const userAgent = navigator.userAgent || 'Unknown';
                const referrer = document.referrer || null;
                
                // Parse device type
                const isMobile = /Mobile|Android|iPhone|iPad|iPod/i.test(userAgent);
                const isTablet = /iPad|Android(?!.*Mobile)/i.test(userAgent);
                let deviceType = 'desktop';
                if (isMobile && !isTablet) deviceType = 'mobile';
                if (isTablet) deviceType = 'tablet';
                
                // Parse browser
                let browser = 'Unknown';
                if (userAgent.includes('Chrome')) browser = 'Chrome';
                else if (userAgent.includes('Safari')) browser = 'Safari';
                else if (userAgent.includes('Firefox')) browser = 'Firefox';
                else if (userAgent.includes('Edge')) browser = 'Edge';
                
                // Parse OS
                let os = 'Unknown';
                if (userAgent.includes('Windows')) os = 'Windows';
                else if (userAgent.includes('Mac OS')) os = 'macOS';
                else if (userAgent.includes('Linux')) os = 'Linux';
                else if (userAgent.includes('Android')) os = 'Android';
                else if (userAgent.includes('iOS')) os = 'iOS';
                
                // Get UTM parameters from URL
                const urlParams = new URLSearchParams(window.location.search);
                const utmSource = urlParams.get('utm_source');
                const utmMedium = urlParams.get('utm_medium');
                const utmCampaign = urlParams.get('utm_campaign');
                
                // Generate session ID (simple implementation)
                let sessionId = sessionStorage.getItem('page_session_id');
                if (!sessionId) {
                    sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    sessionStorage.setItem('page_session_id', sessionId);
                }
                
                // Insert page view
                const { error } = await supabase
                    .from('page_views')
                    .insert({
                        list_id: listId,
                        owner_id: ownerId,
                        user_agent: userAgent,
                        device_type: deviceType,
                        browser: browser,
                        os: os,
                        referrer: referrer,
                        utm_source: utmSource,
                        utm_medium: utmMedium,
                        utm_campaign: utmCampaign,
                        session_id: sessionId
                    });
                
                if (error) {
                    console.error('Error tracking page view:', error);
                } else {
                    console.log('Page view tracked successfully');
                }
            } catch (error) {
                console.error('Error in trackPageView:', error);
            }
        }
