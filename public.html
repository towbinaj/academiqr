    <script>
        // Supabase configuration
        const supabaseUrl = 'https://natzpfyxpuycsuuzbqrd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hdHpwZnl4cHV5Y3N1dXpicXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA5NTExODQsImV4cCI6MjA3NjUyNzE4NH0.q06AAoHZrfS3-O7568VpikaOtn6qAlDyDM7VR6sgzeU';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user'); // Shortened user ID (first 12 chars of UUID)
        const collectionId = urlParams.get('collection'); // Collection ID (UUID)

        // Load profile and collection data
        async function loadProfile() {
            try {
                if (!userId || !collectionId) {
                    console.error('Missing user ID or collection ID parameter');
                    return;
                }
                
                // Load collection by ID
                const { data: collection, error: collectionError } = await supabase
                        .from('link_lists')
                    .select('*')
                    .eq('id', collectionId)
                    .single();

                if (collectionError) {
                    console.error('Error loading collection:', collectionError);
                    return;
                }

                if (!collection) {
                    console.error('No collection found with ID:', collectionId);
                    return;
                }

                // Verify that the collection owner matches the provided user ID
                // This adds a security check to ensure users can only access their own collections
                if (!collection.owner_id || collection.owner_id.substring(0, 12) !== userId) {
                    console.error('Collection owner does not match user ID');
                    return;
                }

                // Track page view
                trackPageView(collection.id, collection.owner_id);

                // Load links
                const { data: links, error: linksError } = await supabase
                    .from('link_items')
                    .select('*')
                    .eq('list_id', collection.id);

                if (linksError) {
                    collection.links = [];
                } else {
                    collection.links = links || [];
                }


                // Load profile
                const { data: profileData, error: profileError } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', collection.owner_id)
                    .single();

                if (profileError) {
                    return;
                }


                // Render everything
                renderProfile(profileData);
                renderLinks(collection.links);
                loadPresentationInfo(collection, profileData);
                
                // Apply theme
                if (collection.theme) {
                    console.log('Raw collection theme:', collection.theme);
                    console.log('Theme type:', typeof collection.theme);
                    
                    // Check if theme is a JSON string that needs parsing
                    let themeToApply = collection.theme;
                    if (typeof collection.theme === 'string') {
                        try {
                            themeToApply = JSON.parse(collection.theme);
                            console.log('Parsed theme from JSON:', themeToApply);
                        } catch (e) {
                            console.log('Failed to parse theme JSON:', e);
                        }
                    }
                    
                    console.log('Final theme to apply:', themeToApply);
                    console.log('Theme keys:', Object.keys(themeToApply));
                    applyTheme(themeToApply);
                    
                    // Re-apply font size and color after theme to ensure they're not overridden
                    // This ensures the font size and color are correct even if theme has issues
                    const displayName = document.getElementById('preview-name');
                    if (displayName) {
                        // Re-apply font size
                        if (typeof applyDynamicDisplayNameSize === 'function') {
                            console.log('Re-applying font size after theme, displayName text:', displayName.textContent);
                            console.log('Theme textFontSize:', themeToApply.textFontSize);
                            applyDynamicDisplayNameSize(displayName, themeToApply);
                            // Force a reflow to ensure the style is applied
                            displayName.offsetHeight;
                            console.log('Final computed font-size:', window.getComputedStyle(displayName).fontSize);
                        }
                        
                        // Re-apply link button font sizes with aggressive approach
                        const allButtons = document.querySelectorAll('.preview-link');
                        allButtons.forEach(button => {
                            const textElement = button.querySelector('.preview-link-text') || button.querySelector('div[style*="flex: 1"] > div');
                            
                            // Ensure minimum font size of 1.375rem (22px) for readability
                            let fontSizeToApply = '1.375rem';
                            if (themeToApply.buttonFontSize) {
                                const themeSizeValue = parseFloat(themeToApply.buttonFontSize);
                                const minSizeValue = 22; // 1.375rem = 22px
                                // If theme size is smaller than minimum, use minimum instead
                                if (themeSizeValue < minSizeValue) {
                                    fontSizeToApply = '1.375rem';
                                } else {
                                    fontSizeToApply = themeToApply.buttonFontSize;
                                }
                            }
                            
                            // Apply font size with multiple methods
                            button.style.setProperty('font-size', fontSizeToApply, 'important');
                            button.style.fontSize = fontSizeToApply;
                            if (textElement) {
                                textElement.style.setProperty('font-size', fontSizeToApply, 'important');
                                textElement.style.fontSize = fontSizeToApply;
                            }
                            // Force a reflow
                            void button.offsetHeight;
                        });
                        
                        // Verify and re-apply link font sizes after a delay
                        setTimeout(() => {
                            allButtons.forEach(button => {
                                const textElement = button.querySelector('.preview-link-text') || button.querySelector('div[style*="flex: 1"] > div');
                                const computedSize = window.getComputedStyle(button).fontSize;
                                
                                // Ensure minimum font size of 1.375rem (22px)
                                let expectedSize = '1.375rem';
                                if (themeToApply.buttonFontSize) {
                                    const themeSizeValue = parseFloat(themeToApply.buttonFontSize);
                                    const minSizeValue = 22; // 1.375rem = 22px
                                    if (themeSizeValue < minSizeValue) {
                                        expectedSize = '1.375rem';
                                    } else {
                                        expectedSize = themeToApply.buttonFontSize;
                                    }
                                }
                                
                                const expectedSizePx = 22; // Always use minimum of 22px
                                const computedSizePx = parseFloat(computedSize);
                                
                                // If computed size is smaller than minimum, force re-apply
                                if (computedSizePx < expectedSizePx - 1) {
                                    console.warn('Link font size not applied correctly, re-applying. Computed:', computedSize, 'Expected:', expectedSize);
                                    button.style.setProperty('font-size', expectedSize, 'important');
                                    button.style.fontSize = expectedSize;
                                    if (textElement) {
                                        textElement.style.setProperty('font-size', expectedSize, 'important');
                                        textElement.style.fontSize = expectedSize;
                                    }
                                }
                            });
                        }, 100);
                        
                        // Re-apply color with aggressive approach
                        // Prioritize presentationColor if it exists, as it's the main color setting
                        const profileColor = themeToApply.presentationColor || themeToApply.profileTextColor || themeToApply.textColor || '#1f2937';
                        console.log('Re-applying profile text color:', profileColor, '(from presentationColor:', themeToApply.presentationColor, 'or profileTextColor:', themeToApply.profileTextColor, ')');
                        // Remove any existing inline color styles first
                        displayName.style.removeProperty('color');
                        displayName.style.setProperty('color', profileColor, 'important');
                        displayName.style.color = profileColor;
                        // Also set as attribute for maximum priority
                        const currentStyle = displayName.getAttribute('style') || '';
                        displayName.setAttribute('style', currentStyle + '; color: ' + profileColor + ' !important;');
                        // Force a reflow
                        void displayName.offsetHeight;
                        
                        // Also re-apply presentation colors
                        // Prioritize presentationColor if it exists, as it's the main color setting
                        const presentationColor = themeToApply.presentationColor || themeToApply.presentationTextColor || themeToApply.textColor || '#4b5563';
                        const presentationValues = document.querySelectorAll('.info-value');
                        presentationValues.forEach(field => {
                            field.style.removeProperty('color');
                            field.style.setProperty('color', presentationColor, 'important');
                            field.style.color = presentationColor;
                            const fieldStyle = field.getAttribute('style') || '';
                            field.setAttribute('style', fieldStyle + '; color: ' + presentationColor + ' !important;');
                        });
                        
                        // Verify and re-apply if needed
                        setTimeout(() => {
                            const computedColor = window.getComputedStyle(displayName).color;
                            console.log('Final computed color:', computedColor);
                            // Re-apply to ensure it sticks
                            displayName.style.removeProperty('color');
                            displayName.style.setProperty('color', profileColor, 'important');
                            displayName.style.color = profileColor;
                            displayName.setAttribute('style', displayName.getAttribute('style') + '; color: ' + profileColor + ' !important;');
                            
                            // Re-apply presentation colors too
                            presentationValues.forEach(field => {
                                field.style.removeProperty('color');
                                field.style.setProperty('color', presentationColor, 'important');
                                field.style.color = presentationColor;
                            });
                        }, 100);
                    }
                } else {
                    console.log('No theme found in collection');
                }
                

            } catch (error) {
            }
        }

        function renderProfile(profile) {
            // Profile photo
            const profilePhoto = document.getElementById('preview-avatar');
            if (profile.profile_photo) {
                // Apply photo positioning if available
                let photoStyle = 'width: 100% !important; height: 100% !important; border-radius: 50% !important; object-fit: cover !important; display: block !important;';
                
                if (profile.profile_photo_position) {
                    try {
                        const position = JSON.parse(profile.profile_photo_position);
                        const scale = position.scale || 100;
                        const x = position.x || 50;
                        const y = position.y || 50;
                        
                        // Convert scale percentage to decimal
                        const scaleValue = scale / 100;
                        
                        // Calculate pan values using the same formula as the main editor
                        const panX = (x - 50) * -1;
                        const panY = (y - 50) * -1;
                        
                        // Apply transform for positioning and scaling
                        photoStyle += ` transform: translate(${panX}%, ${panY}%) scale(${scaleValue}) !important; transform-origin: center center !important;`;
                        
                    } catch (e) {
('Could not parse profile photo position:', e);
                    }
                }
                
                profilePhoto.innerHTML = `<img src="${profile.profile_photo}" alt="Profile" style="${photoStyle}">`;
            } else {
                profilePhoto.innerHTML = '👤';
            }

            // Display name
            const displayName = document.getElementById('preview-name');
            if (displayName) {
                let name = 'User';
                if (profile && profile.display_name && profile.display_name.trim() !== '') {
                    name = profile.display_name;
                } else if (profile && profile.handle && profile.handle.trim() !== '') {
                    name = profile.handle;
                }
                displayName.textContent = name;
                // Apply dynamic font size based on text length
                if (typeof applyDynamicDisplayNameSize === 'function') {
                    applyDynamicDisplayNameSize(displayName);
                }
            }

            // Social links
            renderSocialLinks(profile);
        }

        function renderSocialLinks(profile) {
            const socialLinksContainer = document.getElementById('preview-social');
            socialLinksContainer.innerHTML = '';

('Profile social data:', profile);
('Available social keys:', Object.keys(profile).filter(key => key.startsWith('social_')));

            const socialPlatforms = [
                { key: 'social_email', icon: 'fas fa-envelope', class: 'email' },
                { key: 'social_instagram', icon: 'fab fa-instagram', class: 'instagram' },
                { key: 'social_facebook', icon: 'fab fa-facebook-f', class: 'facebook' },
                { key: 'social_twitter', icon: 'fab fa-x-twitter', class: 'twitter' },
                { key: 'social_linkedin', icon: 'fab fa-linkedin-in', class: 'linkedin' },
                { key: 'social_youtube', icon: 'fab fa-youtube', class: 'youtube' },
                { key: 'social_tiktok', icon: 'fab fa-tiktok', class: 'tiktok' },
                { key: 'social_snapchat', icon: 'fab fa-snapchat', class: 'snapchat' }
            ];

            socialPlatforms.forEach(platform => {
                if (profile[platform.key]) {
                    const link = document.createElement('a');
                    
                    // Special handling for email - use mailto:
                    if (platform.key === 'social_email') {
                        link.href = `mailto:${profile[platform.key]}`;
                        link.target = '_self';
                    } else {
                        link.href = profile[platform.key];
                    link.target = '_blank';
                    link.rel = 'noopener noreferrer';
                    }
                    
                    link.className = `social-icon ${platform.class}`;
                    
                    // Special handling for X/Twitter icon
                    let iconHtml = `<i class="${platform.icon}"></i>`;
                    if (platform.key === 'social_twitter') {
                        iconHtml = `<span style="font-weight: bold; font-size: 16px;">𝕏</span>`;
                    }
                    
                    link.innerHTML = iconHtml;
                    socialLinksContainer.appendChild(link);
                }
            });
        }

        function renderLinks(links) {
            const container = document.getElementById('preview-links');
            container.innerHTML = '';

            if (!links || links.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #6c757d;">No links available</p>';
                return;
            }

            links.forEach(link => {
                console.log('Rendering link:', link.id, 'Title:', link.title, 'Title type:', typeof link.title);
                
                const linkElement = document.createElement('a');
                // Use tracking URL for analytics
                const baseUrl = window.location.origin;
                linkElement.href = `${baseUrl}/api/track/${link.id}`;
                linkElement.target = '_blank';
                linkElement.rel = 'noopener noreferrer';
                linkElement.className = 'preview-link';

                // Set font size immediately on the link element
                linkElement.style.setProperty('font-size', '1.25rem', 'important');
                linkElement.style.fontSize = '1.25rem';

                // Create the link structure
                const imageDiv = document.createElement('div');
                imageDiv.style.cssText = 'width: 48px; height: 48px; border-radius: 8px; margin-right: 12px; overflow: hidden; background: #e5e7eb; display: flex; align-items: center; justify-content: center;';
                
                if (link.image) {
                    const img = document.createElement('img');
                    img.src = link.image;
                    img.alt = 'Link Icon';
                    img.style.cssText = 'width: 100%; height: 100%; object-fit: cover;';
                    imageDiv.appendChild(img);
                } else {
                    const icon = document.createElement('i');
                    icon.className = 'fas fa-link';
                    icon.style.color = '#6b7280';
                    imageDiv.appendChild(icon);
                }
                
                const textContainer = document.createElement('div');
                textContainer.style.cssText = 'flex: 1;';
                
                const textElement = document.createElement('div');
                textElement.className = 'preview-link-text';
                textElement.style.cssText = 'font-weight: 600; font-size: inherit !important;';
                // Use innerHTML to preserve HTML formatting (bold, italic, underline)
                textElement.innerHTML = link.title || '';
                
                textContainer.appendChild(textElement);
                linkElement.appendChild(imageDiv);
                linkElement.appendChild(textContainer);
                
                // Set font size on the text element

        // Calculate dynamic font size for display name based on text length
        // Minimum size is 1.25rem (20px) to ensure readability even for long names
        function calculateDisplayNameFontSize(text, maxSize = '1.75rem', minSize = '1.25rem') {
            if (!text || text.trim().length === 0) {
                return maxSize;
            }
            
            const textLength = text.length;
            const maxSizeValue = parseFloat(maxSize); // Extract numeric value
            const maxSizeUnit = maxSize.replace(/[0-9.]/g, ''); // Extract unit (rem, px, etc.)
            const minSizeValue = parseFloat(minSize); // Extract numeric value for minimum
            const minSizeUnit = minSize.replace(/[0-9.]/g, ''); // Extract unit for minimum
            
            // Ensure both sizes use the same unit (convert minSize to match maxSize unit if needed)
            let minSizeConverted = minSizeValue;
            if (minSizeUnit !== maxSizeUnit) {
                // If units don't match, assume both are rem (default)
                minSizeConverted = minSizeValue;
            }
            
            // Define breakpoints for font size scaling
            // Short names (0-15 chars): use max size (but ensure at least 1.5rem for readability)
            // Medium names (16-25 chars): scale down gradually
            // Long names (26+ chars): use minimum size (1.25rem)
            let fontSize;
            
            // Ensure max size is at least 1.5rem (24px) for readability
            const minMaxSize = 1.5; // 1.5rem minimum for max size
            const effectiveMaxSize = Math.max(maxSizeValue, minMaxSize);
            
            if (textLength <= 15) {
                // Short names: use maximum size (but ensure at least 1.5rem)
                fontSize = effectiveMaxSize;
            } else if (textLength <= 25) {
                // Medium names: scale down proportionally
                // Formula: maxSize - ((textLength - 15) / 10) * (maxSize - minSize)
                const scaleFactor = (textLength - 15) / 10; // 0 to 1 for 16-25 chars
                fontSize = effectiveMaxSize - (scaleFactor * (effectiveMaxSize - minSizeConverted));
            } else {
                // Long names: use minimum size (1.25rem)
                fontSize = minSizeConverted;
            }
            
            // Ensure fontSize never goes below minimum
            if (fontSize < minSizeConverted) {
                fontSize = minSizeConverted;
            }
            
            // Ensure short names (<= 15 chars) never go below 1.5rem for readability
            if (textLength <= 15 && fontSize < 1.5) {
                fontSize = 1.5;
            }
            
            // Round to 2 decimal places and add unit
            return Math.round(fontSize * 100) / 100 + maxSizeUnit;
        }

        // Apply dynamic font size to display name element
        // Accepts optional theme parameter to get max font size
        function applyDynamicDisplayNameSize(nameElement, themeParam) {
            if (!nameElement) return;
            
            try {
                const nameText = nameElement.textContent || '';
                // Always use 1.75rem as default max size for display name (matching index.html)
                // Don't use textFontSize from theme as it's meant for other text elements
                let maxSize = '1.75rem';
                
                // Ensure max size is at least 1.5rem for readability
                const maxSizeValue = parseFloat(maxSize);
                const maxSizeUnit = maxSize.replace(/[0-9.]/g, '') || 'rem';
                const minMaxSize = 1.5; // Minimum max size for readability
                
                // If somehow maxSize is smaller than 1.5rem, use 1.5rem instead
                if (maxSizeValue < minMaxSize) {
                    maxSize = minMaxSize + maxSizeUnit;
                }
                
                // Minimum size is 1.25rem (matching index.html)
                const minSize = '1.25rem';
                const dynamicSize = calculateDisplayNameFontSize(nameText, maxSize, minSize);
                console.log('applyDynamicDisplayNameSize:', {
                    nameText: nameText,
                    nameLength: nameText.length,
                    maxSize: maxSize,
                    minSize: minSize,
                    calculatedSize: dynamicSize
                });
                // Apply font size with maximum priority
                nameElement.style.setProperty('font-size', dynamicSize, 'important');
                // Also set directly to ensure it's applied
                nameElement.style.fontSize = dynamicSize;
                // Force a reflow to ensure browser applies the style
                void nameElement.offsetHeight;
                
                // Double-check and re-apply if needed (for stubborn cases)
                setTimeout(() => {
                    const computedSize = window.getComputedStyle(nameElement).fontSize;
                    const computedSizeValue = parseFloat(computedSize);
                    const expectedSizeValue = parseFloat(dynamicSize);
                    // If computed size is smaller than expected, force re-apply
                    if (computedSizeValue < expectedSizeValue - 0.1) {
                        console.warn('Font size not applied correctly, re-applying. Computed:', computedSize, 'Expected:', dynamicSize);
                        nameElement.style.setProperty('font-size', dynamicSize, 'important');
                        nameElement.style.fontSize = dynamicSize;
                    }
                }, 100);
            } catch (error) {
                console.error('Error applying dynamic display name size:', error);
                // Fallback to default size if there's an error
                nameElement.style.setProperty('font-size', '1.75rem', 'important');
            }
        }

        // Track page view function
        async function trackPageView(listId, ownerId) {
            try {
                // Get visitor information
                const userAgent = navigator.userAgent || 'Unknown';
                const referrer = document.referrer || null;
                
                // Parse device type
                const isMobile = /Mobile|Android|iPhone|iPad|iPod/i.test(userAgent);
                const isTablet = /iPad|Android(?!.*Mobile)/i.test(userAgent);
                let deviceType = 'desktop';
                if (isMobile && !isTablet) deviceType = 'mobile';
                if (isTablet) deviceType = 'tablet';
                
                // Parse browser
                let browser = 'Unknown';
                if (userAgent.includes('Chrome')) browser = 'Chrome';
                else if (userAgent.includes('Safari')) browser = 'Safari';
                else if (userAgent.includes('Firefox')) browser = 'Firefox';
                else if (userAgent.includes('Edge')) browser = 'Edge';
                
                // Parse OS
                let os = 'Unknown';
                if (userAgent.includes('Windows')) os = 'Windows';
                else if (userAgent.includes('Mac OS')) os = 'macOS';
                else if (userAgent.includes('Linux')) os = 'Linux';
                else if (userAgent.includes('Android')) os = 'Android';
                else if (userAgent.includes('iOS')) os = 'iOS';
                
                // Get UTM parameters from URL
                const urlParams = new URLSearchParams(window.location.search);
                const utmSource = urlParams.get('utm_source');
                const utmMedium = urlParams.get('utm_medium');
                const utmCampaign = urlParams.get('utm_campaign');
                
                // Generate session ID (simple implementation)
                let sessionId = sessionStorage.getItem('page_session_id');
                if (!sessionId) {
                    sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    sessionStorage.setItem('page_session_id', sessionId);
                }
                
                // Insert page view
                const { error } = await supabase
                    .from('page_views')
                    .insert({
                        list_id: listId,
                        owner_id: ownerId,
                        user_agent: userAgent,
                        device_type: deviceType,
                        browser: browser,
                        os: os,
                        referrer: referrer,
                        utm_source: utmSource,
                        utm_medium: utmMedium,
                        utm_campaign: utmCampaign,
                        session_id: sessionId
                    });
                
                if (error) {
                    console.error('Error tracking page view:', error);
                } else {
                    console.log('Page view tracked successfully');
                }
            } catch (error) {
                console.error('Error in trackPageView:', error);
            }
        }
